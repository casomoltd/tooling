name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      # `check` type-checks the hooks and runs their tests, so the
      # local devDeps (typescript, @types/node) must be installed.
      - run: npm ci
      - run: npm run check
