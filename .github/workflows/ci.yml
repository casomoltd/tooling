name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # No install needed — the leak-gate only inspects `npm pack` output.
      - run: npm run check
